

<div class="container">
  <div id="items-list-container">
    <h3>I tuoi articoli</h3>
    <ul class="list-group" id="items-list">
      @for (item of items(); track item.id) {
        @if(item.quantity > 0){
          <li class="list-group-item item">
            <app-cart-item
              [vat]="vat()"
              [item]="item"
              (quantityChange)="updateItemQuantity(item, $event)"/>
          </li>
        }
      }
    </ul>
  </div>

  <div class="mt-5">
    <h3>Totale ordine</h3>
    <div class="order-summary">
      <app-summary [items]="items()" [vat]="vat()"/>
    </div>
  </div>
</div>
