<app-product-filter (filterChange)="setFilters($event)" />

<div class="row row-cols-1 row-cols-md-4 g-6 mt-5">
  @for (product of products$ | async; track product.id) {
    <div class="col">
      <app-product-card
        [product]="product"
        [vat]="vat()"
        (onAdd)="add(product.id, $event)"
        (onDetail)="navigateToDetail(product.id)"
      />
    </div>
  }
</div>
