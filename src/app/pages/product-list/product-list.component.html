<div class="container-fluid mt-5">
  <div class="row">
    <div class="col">
      <form>
        <div class="row align-items-end">
          <div class="col">
            <label class="form-label">Name:</label>
            <input type="text" class="form-control" placeholder="Product name">
          </div>
          <div class="col">
            <label class="form-label">Min Price:</label>
            <input type="number" class="form-control">
          </div>
          <div class="col">
            <label class="form-label">Max Price:</label>
            <input type="number" class="form-control">
          </div>
          <div class="col">
            <button class="btn btn-primary">Search</button>
          </div>
        </div>
      </form>

      <div class="row row-cols-1 row-cols-md-4 g-6 mt-5">
        @for(product of products(); track product.id){
          <div class="col">   
             <app-product-card [product]="product" [vat]="0.22" (addToCart)="addToCart($event)"></app-product-card>
          </div>
        }
      </div>
    </div>
    <div class="col side-cart">
      <div class="p-3">
        <h3 class="mb-3">Your Cart</h3>

        <div class="d-flex flex-column gap-2">
          @for(item of cart(); track item.id){
            <app-cart-item-card [item]="item" (toRemove)="toRemove($event)"></app-cart-item-card>
          }
          @empty {
            <p class="text-muted">Il carrello è vuoto</p>
          }
        </div>
      
        <hr>
      
        <div class="d-flex justify-content-between align-items-center fw-bold">
          <span>Totale:</span>
          <span>{{ getTotalCartPrice() | currency }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
