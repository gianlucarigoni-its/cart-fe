<div class="card mt-2">
  <div class="card-body">
    <h5 class="card-title"> {{calcItem().product.name}} </h5>
    <h6 class="card-subtitle mb-2 text-muted">Prezzo: {{calcItem().product.netPrice*vat() | currency}} </h6>
    <h6 class="card-subtitle mb-2 text-muted">Quantità: {{ calcItem().quantity }} </h6>
    <p class="card-text">Prezzo Totale: {{calcItem().totalNetPrice | currency }} </p>
    <a href="#" class="btn btn-link">details</a>
  </div>
  <div class="card-footer text-muted text-end">
    <button class="btn btn-link">Remove</button>
  </div>
</div>
