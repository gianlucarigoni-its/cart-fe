<div class="card mt-2">
  <div class="card-body">
    <h5 class="card-title"> {{item().product.name}} </h5>
    <h6 class="card-subtitle mb-2 text-muted">Prezzo: {{item().product.netPrice | currency}} </h6>
    <h6 class="card-subtitle mb-2 text-muted">Quantità: {{ item().quantity }} </h6>
    <h6 class="card-subtitle mb-2 text-muted">Sconto: {{ item().product.discount*100 }}% </h6>
    <p class="card-text">Prezzo Totale: {{calcItem().totalPrice| currency }} </p>
    <a [routerLink]="'/detail/' + item().product.id" class="btn btn-link">details</a>
  </div>
  <div class="card-footer text-muted text-end">
    <button class="btn btn-link" (click)="onRemove()">Remove</button>
  </div>
</div>
